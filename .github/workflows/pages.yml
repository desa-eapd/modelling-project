name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - name: Add Linux bundle platform
        run: bundle lock --add-platform x86_64-linux

      - name: Install dependencies
        run: bundle install --jobs 4 --retry 3

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Configure Pages URL
        run: |
          printf 'url: "https://%s.github.io"\n' "${GITHUB_REPOSITORY_OWNER}" > _config_pages.yml

      - name: Build with Jekyll
        run: bundle exec jekyll build --config _config.yml,_config_pages.yml --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
