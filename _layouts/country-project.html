---
layout: default
body_classes: page-country-project
---

<div class="section">
  <div class="container country-project-container">
    <div class="country-project-header">
      {% if page.flag %}
        {% assign country_project_flag_src = page.flag %}
        {% unless page.flag contains '://' %}
          {% assign country_project_flag_src = page.flag | relative_url %}
        {% endunless %}
        <img
          class="country-project-flag"
          src="{{ country_project_flag_src }}"
          alt="{{ page.title }} flag"
          loading="lazy"
        />
      {% endif %}

      <div class="country-project-title-wrap">
        <h1>{{ page.title }}</h1>
        <div class="country-project-rule"></div>
      </div>
    </div>

    <div class="country-project-content content">
      {{ content }}
    </div>
  </div>
</div>
