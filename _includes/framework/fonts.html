{% if site.fonts.use_google_fonts %}
    <link href="https://fonts.gstatic.com" rel="preconnect">
    <link href="{{ site.fonts.google_fonts_url }}" rel="stylesheet">
{% endif %}
{% if site.fonts.use_self_hosted_fonts %}
    <!-- Preload the primary body and heading fonts to reduce navigation-time font swapping -->
    <link rel="preload" href="{{ '/assets/fonts/source-sans-3/source-sans-3-v10-latin-regular.woff2' | relative_url }}" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="{{ '/assets/fonts/source-sans-3/source-sans-3-v10-latin-700.woff2' | relative_url }}" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="{{ '/assets/fonts/lato/lato-v24-latin-regular.woff2' | relative_url }}" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="{{ '/assets/fonts/lato/lato-v24-latin-700.woff2' | relative_url }}" as="font" type="font/woff2" crossorigin>
    <link href="{{ '/assets/css/fonts.css' | relative_url }}" rel="stylesheet">
{% endif %}
